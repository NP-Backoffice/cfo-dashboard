<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>NOWPEAK — アクセス</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Noto Sans JP','Space Mono',sans-serif;font-weight:300;
  background:#000;color:#fff;
  min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;opacity:.25;
  background-image:radial-gradient(circle,#1a1a1a 1px,transparent 1px);
  background-size:24px 24px;
}
.gate{position:relative;z-index:1;text-align:center;width:100%;max-width:400px;padding:40px 24px}
.dot{width:10px;height:10px;background:#ff0000;margin:0 auto 36px}
.brand{font-family:'Space Mono',monospace;font-size:14px;font-weight:700;letter-spacing:8px;margin-bottom:6px}
.sub{font-size:11px;color:#444;letter-spacing:3px;margin-bottom:48px;font-weight:300}
.field{position:relative;margin-bottom:36px}
.field input{
  width:100%;background:transparent;border:none;border-bottom:1px solid #333;
  color:#fff;font-family:'Noto Sans JP',sans-serif;font-size:13px;font-weight:300;
  letter-spacing:2px;padding:12px 0;outline:none;text-align:center;
}
.field input::placeholder{color:#333;letter-spacing:3px;font-weight:300}
.field input:focus{border-bottom-color:#ff0000}
.field .line{
  position:absolute;bottom:0;left:50%;width:0;height:1px;
  background:#ff0000;transition:all .3s;transform:translateX(-50%);
}
.field input:focus ~ .line{width:100%}
.btn{
  font-family:'Space Mono',monospace;font-size:10px;font-weight:700;letter-spacing:4px;
  padding:14px 48px;border:1px solid #ff0000;color:#ff0000;
  background:transparent;cursor:pointer;transition:all .2s;
}
.btn:hover{background:#ff0000;color:#000}
.btn:active{transform:scale(.98)}
.err{
  margin-top:24px;font-size:11px;color:#ff0000;letter-spacing:1px;
  opacity:0;transition:opacity .3s;font-weight:300;
}
.err.show{opacity:1}
.loading{display:none;margin-top:24px;font-size:10px;color:#333;letter-spacing:2px;font-weight:300}
.dots{margin-top:48px;display:flex;justify-content:center;gap:8px}
.dots span{width:4px;height:4px;background:#1a1a1a;display:block}
.dots span:nth-child(5){background:#ff0000}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
.shake{animation:shake .3s ease}
</style>
</head>
<body>
<div class="gate" id="gate">
  <div class="dot"></div>
  <div class="brand">NOWPEAK</div>
  <div class="sub">CFO ダッシュボード</div>
  <div class="field">
    <input type="password" id="pw" placeholder="パスワード" autocomplete="off"
      onkeydown="if(event.key==='Enter')decrypt()">
    <div class="line"></div>
  </div>
  <button class="btn" onclick="decrypt()">アクセス</button>
  <div class="err" id="err">認証に失敗しました</div>
  <div class="loading" id="loading">復号中...</div>
  <div class="dots">
    <span></span><span></span><span></span><span></span>
    <span></span>
    <span></span><span></span><span></span><span></span>
  </div>
</div>

async function decrypt(){
  const pw=document.getElementById('pw').value;
  if(!pw)return;
  const err=document.getElementById('err');
  const loading=document.getElementById('loading');
  const gate=document.getElementById('gate');
  err.classList.remove('show');
  loading.style.display='block';
  try{
    const raw=Uint8Array.from(atob(D),c=>c.charCodeAt(0));
    const salt=raw.slice(0,16);
    const iv=raw.slice(16,28);
    const tag=raw.slice(28,44);
    const ct=raw.slice(44);
    const enc=new TextEncoder();
    const km=await crypto.subtle.importKey('raw',enc.encode(pw),'PBKDF2',false,['deriveKey']);
    const key=await crypto.subtle.deriveKey(
      {name:'PBKDF2',salt,iterations:100000,hash:'SHA-256'},
      km,{name:'AES-GCM',length:256},false,['decrypt']
    );
    const combined=new Uint8Array(ct.length+16);
    combined.set(ct);combined.set(tag,ct.length);
    const dec=await crypto.subtle.decrypt({name:'AES-GCM',iv},key,combined);
    const html=new TextDecoder().decode(dec);
    document.open();document.write(html);document.close();
  }catch(e){
    loading.style.display='none';
    err.classList.add('show');
    gate.classList.add('shake');
    setTimeout(()=>gate.classList.remove('shake'),300);
    document.getElementById('pw').value='';
    document.getElementById('pw').focus();
  }
}
